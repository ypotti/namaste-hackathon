# Topology:
#
#   internet
#      │  :80 / :443
#      ▼
#   nginx  ──────────────────────────────────────┐
#   (nginx:stable-alpine)                        │ proxy_pass http://frontend:3000
#      │ certbot webroot challenge                │
#      ▼                                         ▼
#   certbot (one-shot + renew cron)          frontend  (nginx:1.29-alpine + React SPA)
#                                                │ proxy_pass http://api:8000  (/api/*)
#                                                ▼
#                                            api  (FastAPI/uvicorn :8000, internal only)
#                                                │
#                                                ▼
#                                            postgres (:5432, internal only)
#
# First-run TLS bootstrap — see docs/TLS_SETUP.md

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: physicsforge
      POSTGRES_USER: physicsforge
      POSTGRES_PASSWORD: physicsforge
    ports:
      - "5433:5432"
    volumes:
      - physicsforge_postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physicsforge -d physicsforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://physicsforge:physicsforge@postgres:5432/physicsforge
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLANNER_MODEL: ${PLANNER_MODEL:-gpt-4o-mini}
      GENERATOR_MODEL: ${GENERATOR_MODEL:-gpt-4o-mini}
      REVIEWER_MODEL: ${REVIEWER_MODEL:-gpt-4o-mini}
      REVIEWER_VISION_MODEL: ${REVIEWER_VISION_MODEL:-}
      SCREENSHOT_ENABLED: ${SCREENSHOT_ENABLED:-false}
      SCREENSHOT_SAVE: ${SCREENSHOT_SAVE:-true}
      GUARDRAIL_ENABLED: ${GUARDRAIL_ENABLED:-true}
      GUARDRAIL_THRESHOLD: ${GUARDRAIL_THRESHOLD:-0.35}
      GUARDRAIL_EMBEDDING_MODEL: ${GUARDRAIL_EMBEDDING_MODEL:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-}
      GENERATION_RATE_LIMIT_REQUESTS: ${GENERATION_RATE_LIMIT_REQUESTS:-}
      GENERATION_RATE_LIMIT_WINDOW_SECONDS: ${GENERATION_RATE_LIMIT_WINDOW_SECONDS:-}
      WORKFLOW_TIMEOUT_SECONDS: ${WORKFLOW_TIMEOUT_SECONDS:-}
    # Not exposed on the host — all traffic arrives via the frontend nginx proxy.
    expose:
      - "8000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn math_puzzle_agent.api.app:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/ready')"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # React SPA + internal API proxy.
  # Built from frontend/Dockerfile (nginx:1.29-alpine).
  # NOT exposed on the host — only reachable by the nginx TLS terminator.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # TLS-terminating reverse proxy.
  # Serves port 80 (ACME challenge + HTTP→HTTPS redirect) and 443 (HTTPS).
  # Config is split into two files in nginx/conf.d/:
  #   default.conf  — always loaded; handles HTTP and ACME challenges
  #   ssl.conf      — loaded only after the certificate volume is populated
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      frontend:
        condition: service_healthy
    # Reload nginx every 6 hours to pick up renewed certificates.
    command: >
      sh -c "nginx -g 'daemon off;' &
             while :; do sleep 6h; nginx -s reload; done"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Certbot for Let's Encrypt certificate issuance and renewal.
  # On first run: issue the certificate (see docs/TLS_SETUP.md).
  # In normal operation: attempt renewal every 12 hours; nginx reloads every 6h
  # to pick up the new cert.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    # After the initial cert is issued, keep the container running and renew
    # automatically. Nginx reloads on its own schedule to pick up renewed certs.
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  physicsforge_postgres:
  # Shared between certbot (write) and nginx (read) for ACME challenge files.
  certbot_webroot:
  # Let's Encrypt certificates — shared between certbot (write) and nginx (read).
  letsencrypt:
