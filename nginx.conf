# NOTE: This file is kept for reference only.
#
# TLS termination is now handled by the nginx container in docker-compose.yml.
# The active configuration lives in nginx/conf.d/:
#
#   nginx/conf.d/default.conf  — HTTP :80, ACME challenge + HTTP→HTTPS redirect
#   nginx/conf.d/ssl.conf      — HTTPS :443, proxy to frontend container
#
# These files are bind-mounted into the nginx container at runtime:
#   ./nginx/conf.d → /etc/nginx/conf.d
#
# Certificates are managed by the certbot container and stored in the
# letsencrypt named volume, also mounted into nginx at /etc/letsencrypt.
#
# There is no longer a need to install anything on the host nginx.
# See docs/TLS_SETUP.md for first-run certificate bootstrap instructions.
