# Host-level Nginx configuration for physicsforge.toolchant.com.
# Install as /etc/nginx/conf.d/toolchant.conf after TLS certificates exist.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream toolchant_frontend {
    server 127.0.0.1:5173;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name physicsforge.toolchant.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://physicsforge.toolchant.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name physicsforge.toolchant.com;

    ssl_certificate /etc/letsencrypt/live/physicsforge.toolchant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physicsforge.toolchant.com/privkey.pem;
    ssl_session_cache shared:ToolchantTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 16k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://toolchant_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Generation progress is streamed using server-sent events.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
