# Phase 2 – HTTPS termination (loaded once the certificate exists).
# Proxies all traffic to the frontend container (nginx + React SPA on port 3000).
# The frontend container itself proxies /api/* to the api container internally.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name physicsforge.toolchant.com;

    # Certificates managed by certbot (letsencrypt volume).
    ssl_certificate     /etc/letsencrypt/live/physicsforge.toolchant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/physicsforge.toolchant.com/privkey.pem;

    # TLS hardening.
    ssl_session_cache   shared:PhysicsForgeTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Max upload size (adjust if the API accepts large payloads).
    client_max_body_size 16k;

    # All traffic is forwarded to the frontend nginx container.
    # The frontend container handles:
    #   /api/*  → http://api:8000  (proxy_pass inside the frontend nginx)
    #   /*      → React SPA static files
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket / SSE support (used by generation progress stream).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
