# Phase 1 – HTTP only (before TLS certificate exists).
# Serves the ACME challenge for certbot and redirects everything else to HTTPS.
# Once the certificate is issued, nginx will load ssl.conf automatically
# (it includes all files in conf.d/) and this file continues to handle the
# HTTP → HTTPS redirect permanently.

server {
    listen 80;
    listen [::]:80;
    server_name physicsforge.toolchant.com;

    # Let certbot's webroot plugin write challenge files here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS.
    location / {
        return 301 https://physicsforge.toolchant.com$request_uri;
    }
}
